<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lexora — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      padding: 32px;
      max-width: 480px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
      background: linear-gradient(90deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    input[type="url"] {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      margin-bottom: 6px;
    }
    input[type="url"]:focus { border-color: #818cf8; }
    .hint {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 20px;
    }
    button {
      padding: 10px 20px;
      background: linear-gradient(90deg, #4f46e5, #7c3aed);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #lx-saved {
      display: none;
      font-size: 12px;
      color: #4ade80;
      margin-left: 10px;
    }
  </style>
</head>
<body>
  <h1>Lexora Settings</h1>

  <label for="lx-base-url">Lexora server URL</label>
  <input type="url" id="lx-base-url" placeholder="http://localhost:5433">
  <p class="hint">Base URL of your Lexora instance (no trailing slash). Default: http://localhost:5433</p>

  <button id="lx-save-btn">Save</button>
  <span id="lx-saved">✓ Saved</span>

  <script src="options.js"></script>
</body>
</html>
