worker_processes auto;  # match number of CPU cores
user nobody nogroup;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;   # raised from 1024 — handles concurrent upload/download during backup
    accept_mutex off;
    use epoll;
    multi_accept on;
}

http {
    include mime.types;
    default_type application/octet-stream;

    log_format json_analytics escape=json '{'
      '"time_local":"$time_local",'
      '"remote_addr":"$remote_addr",'
      '"status": "$status",'
      '"body_bytes_sent":"$body_bytes_sent",'
      '"request_time":"$request_time",'
      '"request_method":"$request_method",'
      '"http_referrer":"$http_referer",'
      '"http_user_agent":"$http_user_agent",'
      '"rt":"$request_time",'
      '"urt":"$upstream_response_time"'
    '}';

    access_log /var/log/nginx/access.log json_analytics;
    error_log /var/log/nginx/error.log warn;

    # ── File cache ────────────────────────────────────────────────────────────
    open_file_cache max=200000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ── Keep-alive ────────────────────────────────────────────────────────────
    keepalive_timeout 75s;
    keepalive_requests 10000;

    # ── Proxy settings ────────────────────────────────────────────────────────
    # Raised significantly so large database dumps/restores via the Odoo
    # web interface (/web/database/backup|restore) never time out mid-transfer.
    proxy_connect_timeout      600s;   # time to establish connection to upstream
    proxy_read_timeout         600s;   # time to wait for upstream to send data (pg_dump can be slow)
    proxy_send_timeout         600s;   # time to send request body to upstream
    proxy_buffer_size          128k;   # buffer for the response header
    proxy_buffers              16 128k;  # buffers for the response body
    proxy_busy_buffers_size    256k;
    proxy_temp_file_write_size 256k;
    proxy_intercept_errors     on;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $http_host;
    proxy_redirect off;

    # ── Client / upload limits ────────────────────────────────────────────────
    # Raised so restoring a large .sql/.dump file via the Odoo DB manager
    # (or any direct HTTP upload) doesn't get rejected at the nginx layer.
    client_max_body_size       2g;     # raised from 10m — accommodates large backup uploads
    client_body_buffer_size    10m;    # buffer before spooling to disk
    client_body_timeout        600s;   # time to receive the full request body
    client_header_timeout      60s;    # time to receive the request headers
    send_timeout               600s;   # time between successive client reads during response
    reset_timedout_connection  on;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_disable "msie6";
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_proxied any;
    gzip_types
    application/atom+xml
    application/geo+json
    application/javascript
    application/x-javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rdf+xml
    application/rss+xml
    application/xhtml+xml
    application/xml
    font/eot
    font/otf
    font/ttf
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

    # ── Other ─────────────────────────────────────────────────────────────────
    charset utf-8;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;

    map $sent_http_content_type $expires {
        "text/html"                  epoch;
        "text/html; charset=utf-8"   epoch;
        default                      off;
    }

    upstream backend_server {
        server odoo:8069 fail_timeout=0;
    }

    server {
        listen 81;
        listen [::]:81;
        server_name 127.0.0.1 localhost;

        # ── Default location ──────────────────────────────────────────────────
        location / {
            # Per-location overrides (kept for safety even though the global
            # limit is already 2 g).
            client_max_body_size    2g;
            client_body_buffer_size 10m;

            proxy_pass http://backend_server;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Database backup / restore ─────────────────────────────────────────
        # Odoo exposes its own DB manager at these paths.  Very long timeouts
        # are appropriate here — a large backup download or restore upload can
        # easily take 5–15 minutes on a slow server.
        location ~ ^/web/database/(backup|restore|duplicate) {
            client_max_body_size    2g;
            client_body_buffer_size 10m;
            proxy_connect_timeout   600s;
            proxy_read_timeout      1800s;  # 30 min — generous for large DB restores
            proxy_send_timeout      1800s;
            proxy_pass http://backend_server;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~ ^/(robots.txt|sitemap.*.xml) {
            proxy_pass http://odoo:8069$uri$is_args$args;
        }

        # ── WebSocket / long-poll ─────────────────────────────────────────────
        location /websocket {
            proxy_pass http://odoo:8072;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;  # keep WebSocket alive during long sessions

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Monitoring stub ───────────────────────────────────────────────────
        location /stub_status {
            stub_status on;
            access_log off;
            allow 172.16.0.0/12;
            allow 127.0.0.1;
            deny all;
        }
    }
}