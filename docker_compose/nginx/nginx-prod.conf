worker_processes auto;
user nobody nogroup;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    accept_mutex off;
    use epoll;
    multi_accept on;
}

http {
    include mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" "$request_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ── File cache ────────────────────────────────────────────────────────────
    open_file_cache max=200000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ── Keep-alive ────────────────────────────────────────────────────────────
    keepalive_timeout 75s;
    keepalive_requests 10000;

    # ── Proxy settings ────────────────────────────────────────────────────────
    proxy_connect_timeout      600s;
    proxy_read_timeout         600s;
    proxy_send_timeout         600s;
    proxy_buffer_size          128k;
    proxy_buffers              16 128k;
    proxy_busy_buffers_size    256k;
    proxy_temp_file_write_size 256k;
    proxy_intercept_errors     on;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $http_host;
    proxy_redirect off;

    # ── Client / upload limits ────────────────────────────────────────────────
    client_max_body_size       2g;
    client_body_buffer_size    10m;
    client_body_timeout        600s;
    client_header_timeout      60s;
    send_timeout               600s;
    reset_timedout_connection  on;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_disable "msie6";
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_proxied any;
    gzip_types
    application/atom+xml
    application/geo+json
    application/javascript
    application/x-javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rdf+xml
    application/rss+xml
    application/xhtml+xml
    application/xml
    font/eot
    font/otf
    font/ttf
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

    # ── Other ─────────────────────────────────────────────────────────────────
    charset utf-8;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    access_log /var/log/nginx/access.log main;

    map $sent_http_content_type $expires {
        "text/html" epoch;
        "text/html; charset=utf-8" epoch;
        default off;
    }

    upstream backend_server {
        server django-prod:8000 fail_timeout=0;
    }

    server {
        listen 443 ssl;
        server_name api.rakvzan.space;

        ssl_certificate /etc/letsencrypt/live/api.rakvzan.space/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.rakvzan.space/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {
            client_max_body_size    2g;
            client_body_buffer_size 10m;
            proxy_pass http://django-prod:8000;
        }

        # Database backup / restore — very long timeouts, large body allowed.
        location ~ ^/web/database/(backup|restore|duplicate) {
            client_max_body_size    2g;
            client_body_buffer_size 10m;
            proxy_connect_timeout   600s;
            proxy_read_timeout      1800s;
            proxy_send_timeout      1800s;
            proxy_pass http://backend_server;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~ ^/(robots.txt|sitemap.*.xml) {
            proxy_pass http://django-prod:8000$uri$is_args$args;
        }

        location /ws/ {
            proxy_pass http://backend_server/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_set_header Host $host;
            proxy_redirect off;
        }

        location /static/ {
            alias /app/src/staticfiles/;
            autoindex off;
            expires 365d;
            add_header Cache-Control "public, max-age=31536000";
            add_header Access-Control-Allow-Origin *;
            access_log off;
            log_not_found off;
        }

        location /media/ {
            root /app/src/;
            autoindex off;
            expires 365d;
            add_header Cache-Control "public, max-age=31536000";
            add_header Access-Control-Allow-Origin *;
            access_log off;
            log_not_found off;
        }
    }
}