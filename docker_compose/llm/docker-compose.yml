services:
  llm-service:
    build:
      context: ../..
      dockerfile: docker_compose/llm/Dockerfile
    container_name: llm_service
    restart: unless-stopped
    # The real LLM service requires significant RAM (Qwen3 8B ~8-16 GB).
    # In dev this is a stub with no model loaded; llm_ready=false in /health.
    ports:
      - "8002:8000"
    env_file:
      - ../../.env
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
    networks:
      - backend

networks:
  backend:
    external: true
