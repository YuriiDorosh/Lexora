services:
  anki-service:
    build:
      context: ../..
      dockerfile: docker_compose/anki/Dockerfile
    container_name: anki_service
    restart: unless-stopped
    ports:
      - "8003:8000"
    env_file:
      - ../../.env
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
    networks:
      - backend
    # RabbitMQ is in a separate compose file; pika connection_attempts handles retries.

networks:
  backend:
    external: true
