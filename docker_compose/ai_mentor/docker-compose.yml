services:
  ai-mentor-service:
    build:
      context: ../..
      dockerfile: docker_compose/ai_mentor/Dockerfile
    container_name: ai_mentor_service
    restart: unless-stopped
    ports:
      - "8005:8000"
    env_file:
      - ../../.env
    environment:
      # ── PostgreSQL (pgvector) ──────────────────────────────────
      # Connects to the shared Postgres container to create the
      # ai_mentor_docs table with vector embeddings.
      PGVECTOR_HOST: ${POSTGRES_HOST:-postgres}
      PGVECTOR_PORT: ${POSTGRES_PORT:-5432}
      PGVECTOR_DB: ${POSTGRES_DB}
      PGVECTOR_USER: ${POSTGRES_USER}
      PGVECTOR_PASS: ${POSTGRES_PASSWORD}

      # ── LLM model (generation) ─────────────────────────────────
      # Default: Qwen2.5-1.5B-Instruct Q4_K_M (~1.2 GiB resident).
      # Same model as the LLM enrichment service — familiar quality.
      # Upgrade: set LLM_MODEL_REPO=microsoft/Phi-3-mini-4k-instruct-gguf
      #          and LLM_MODEL_FILENAME=Phi-3-mini-4k-instruct-q4.gguf
      #          (requires ≥12 GiB RAM when running alongside other services).
      LLM_MODEL_REPO: ${AI_LLM_MODEL_REPO:-Qwen/Qwen2.5-1.5B-Instruct-GGUF}
      LLM_MODEL_FILENAME: ${AI_LLM_MODEL_FILENAME:-qwen2.5-1.5b-instruct-q4_k_m.gguf}
      LLM_MODEL_DIR: /models/llm
      LLM_N_CTX: ${AI_LLM_N_CTX:-2048}
      LLM_N_THREADS: ${AI_LLM_N_THREADS:-0}
      LLM_MAX_TOKENS: ${AI_LLM_MAX_TOKENS:-400}
      LLM_AUTO_DOWNLOAD: ${AI_LLM_AUTO_DOWNLOAD:-1}

      # ── Embedding model (retrieval) ────────────────────────────
      # fastembed with BAAI/bge-small-en-v1.5 (~33 MB ONNX, 384-dim).
      # CPU-only, no GPU required. Downloaded on first start.
      EMBED_MODEL: ${AI_EMBED_MODEL:-BAAI/bge-small-en-v1.5}
      EMBED_DIM: ${AI_EMBED_DIM:-384}

      # ── Odoo integration ───────────────────────────────────────
      # Used for seeding knowledge from Lexora content on first boot.
      ODOO_URL: ${ODOO_URL:-http://odoo:8069}

      # ── Retrieval config ───────────────────────────────────────
      RAG_TOP_K: ${AI_RAG_TOP_K:-5}        # chunks retrieved per query
      RAG_MIN_SCORE: ${AI_RAG_MIN_SCORE:-0.30}  # cosine similarity threshold

    volumes:
      - ai_mentor_models:/models
    networks:
      - backend

volumes:
  ai_mentor_models:
    name: lexora_ai_mentor_models

networks:
  backend:
    external: true
