repos:
  # ---------------------------------------------------------------------------
  # General file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ".*\\.xml$"          # XML files may have intentional trailing space
      - id: end-of-file-fixer
        exclude: ".*\\.xml$"
      - id: check-yaml
        args: ["--unsafe"]            # allow anchors / merge keys
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  # ---------------------------------------------------------------------------
  # Ruff — linter (fast, replaces flake8 + isort + pyupgrade + bugbear)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
        types_or: [python, pyi]
        exclude: |
          (?x)^(
            src/addons/base_search_fuzzy/.*|
            src/addons/password_security/.*|
            src/addons/web_notify/.*|
            src/addons/website_menu_by_user_status/.*|
            src/addons/website_require_login/.*|
            src/addons/language_portal/data/seed_vocab\.py|
            src/addons/language_portal/data/cloze_exercises\.py|
            src/addons/language_portal/data/idioms_data\.py|
            src/addons/language_portal/data/phrasebook_data\.py
          )$
      - id: ruff-format
        types_or: [python, pyi]
        exclude: |
          (?x)^(
            src/addons/base_search_fuzzy/.*|
            src/addons/password_security/.*|
            src/addons/web_notify/.*|
            src/addons/website_menu_by_user_status/.*|
            src/addons/website_require_login/.*|
            src/addons/language_portal/data/seed_vocab\.py|
            src/addons/language_portal/data/cloze_exercises\.py|
            src/addons/language_portal/data/idioms_data\.py|
            src/addons/language_portal/data/phrasebook_data\.py
          )$

  # ---------------------------------------------------------------------------
  # Mypy — type checking (FastAPI services only)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: "^services/"
        additional_dependencies:
          - fastapi>=0.115.5
          - pika>=1.3.2
          - types-requests
          - types-pyyaml

  # ---------------------------------------------------------------------------
  # Security scanning
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-ll"]   # only HIGH/MEDIUM severity
        files: "^services/"
        exclude: "test_"

  # ---------------------------------------------------------------------------
  # Docker / compose
  # ---------------------------------------------------------------------------
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args: ["--ignore", "DL3008", "--ignore", "DL3013",
               "--ignore", "DL3042", "--ignore", "SC2046"]

  # ---------------------------------------------------------------------------
  # XML / Odoo views — basic well-formedness check
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-xml
        files: "src/addons/.*\\.xml$"
