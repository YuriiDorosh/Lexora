name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly scan every Monday at 09:00 UTC
    - cron: "0 9 * * 1"

permissions:
  contents: read
  security-events: write   # required for SARIF upload

jobs:
  # ---------------------------------------------------------------------------
  # Dependency vulnerability scan — pip-audit
  # ---------------------------------------------------------------------------
  pip-audit:
    name: pip-audit (dependency vulnerabilities)
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        service: [translation, llm, anki, audio]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit ${{ matrix.service }} dependencies
        run: pip-audit -r services/${{ matrix.service }}/requirements.txt
        continue-on-error: true   # report but don't fail build on first run

  # ---------------------------------------------------------------------------
  # Secrets scan — truffleHog
  # ---------------------------------------------------------------------------
  trufflehog:
    name: TruffleHog (secrets scan)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for secret scan

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ---------------------------------------------------------------------------
  # Bandit SARIF report (uploaded to GitHub Security tab)
  # ---------------------------------------------------------------------------
  bandit-sarif:
    name: Bandit SARIF
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit[sarif]==1.7.8

      - name: Bandit SARIF scan
        run: |
          bandit -r services/ src/addons/ \
            --exclude src/addons/base_search_fuzzy,src/addons/password_security,\
          src/addons/web_notify,src/addons/website_menu_by_user_status,\
          src/addons/website_require_login \
            -ll \
            -f sarif \
            -o bandit-report.sarif || true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-report.sarif
