name: PR Checks

on:
  pull_request:
    branches: ["main"]
    types: [opened, edited, synchronize, reopened]

jobs:
  # Enforce PR title follows Conventional Commits
  pr-title:
    name: PR title (Conventional Commits)
    runs-on: ubuntu-24.04
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            ci
            build
            revert
          scopes: |
            M0 M1 M2 M3 M4 M5 M6 M7 M8 M9 M10
            M11 M12 M13 M14 M15 M16 M17 M18 M19 M20 M21
            security core words translation enrichment audio anki
            chat dashboard pvp portal learning
            docker ci deps docs tooling
          requireScope: false

  # Check that branch name follows convention
  branch-name:
    name: Branch name convention
    runs-on: ubuntu-24.04
    steps:
      - name: Check branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ "$BRANCH" =~ ^(main|m[0-9]+.*|feat/.*|fix/.*|docs/.*|chore/.*|ci/.*|hotfix/.*|tooling.*)$ ]]; then
            echo "Branch name '$BRANCH' is valid"
          else
            echo "::error::Branch name '$BRANCH' does not follow conventions."
            echo "Expected: main | m<N>_* | feat/* | fix/* | docs/* | chore/* | ci/* | tooling*"
            exit 1
          fi
