name: Docker Build Check

on:
  push:
    branches: ["main"]
    paths:
      - "docker_compose/**"
      - "services/**"
      - "requirements/**"
  pull_request:
    branches: ["main"]
    paths:
      - "docker_compose/**"
      - "services/**"
      - "requirements/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-services:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        service: [translation, llm, anki, audio]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker_compose/${{ matrix.service }}/Dockerfile
          push: false
          tags: lexora-${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  build-odoo:
    name: Build Odoo image
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Odoo
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker_compose/odoo/Dockerfile
          push: false
          tags: lexora-odoo:ci
          cache-from: type=gha,scope=odoo
          cache-to: type=gha,mode=max,scope=odoo
