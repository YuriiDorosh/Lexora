name: Feature Request
description: Propose a new feature or enhancement
labels: ["enhancement"]
assignees: ["YuriiDorosh"]

body:
  - type: dropdown
    id: milestone
    attributes:
      label: Target milestone
      options:
        - M22 — New milestone (TBD)
        - Cross-cutting improvement
        - Infrastructure / DevOps
        - UX / Design
        - Performance
        - Security / Privacy
        - Documentation
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What limitation or user need drives this request?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature. Include UI sketches, API shapes, or model fields if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: complexity
    attributes:
      label: Estimated complexity
      options:
        - Small (1–2 hours, single file change)
        - Medium (half-day, 1–3 modules)
        - Large (full day+, multiple modules or new service)
        - Unknown
    validations:
      required: true
